<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Projeto GitHub</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header, footer {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 1rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            margin-top: 1rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        #mensagem {
            margin-top: 1rem;
            font-weight: bold;
            color: #ff5722;
        }
    </style>
</head>
<body>
    <header>
        <h1>Bem-vindo ao meu Projeto!</h1>
    </header>

    <main>
        <p>Este é um exemplo simples usando HTML, CSS e JavaScript.</p>
        <button id="meuBotao">Clique aqui!</button>
        <p id="mensagem"></p>
    </main>

    <footer>
        <p>Feito com ❤️ para o GitHub</p>
    </footer>

    <script>
        // Seleciona o botão e o parágrafo de mensagem
        const botao = document.getElementById('meuBotao');
        const mensagem = document.getElementById('mensagem');

        // Adiciona evento de clique
        botao.addEventListener('click', () => {
            const hora = new Date().getHours();
            if (hora < 12) {
                mensagem.textContent = "Bom dia! 🌞";
            } else if (hora < 18) {
                mensagem.textContent = "Boa tarde! ☀️";
            } else {
                mensagem.textContent = "Boa noite! 🌙";
            }
        });
    </script>
</body>
</html>
